schemaVersion: "1"
kind: mixin
name: kiro-sandbox
displayName: Kiro Sandbox
extends: kiro

network:
  allowedDomains:
    - mcp.exa.ai
    - api.figma.com
    - "*"
  serviceDomains:
    mcp.exa.ai: exa
    api.figma.com: figma
  serviceAuth:
    exa:
      headerName: x-api-key
      valueFormat: "%s"
    figma:
      headerName: "X-Figma-Token"
      valueFormat: "%s"

credentials:
  sources:
    exa:
      env:
        - EXA_API_KEY
    figma:
      env:
        - FIGMA_API_KEY

environment:
  proxyManaged:
    - EXA_API_KEY
    - FIGMA_API_KEY
  variables:
    CMUX_NOTIFY_URL: http://host.docker.internal:17363/notify
    PNPM_HOME: /home/agent/.local/share/pnpm
    PATH: /home/agent/.local/bin:/home/agent/.local/share/pnpm:/usr/local/share/npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

commands:
  install: []

memory: |
  ## Network service binding rule

  When starting any network service inside the sandbox (dev server, API,
  preview server, etc.), always bind to `0.0.0.0`. Never bind to
  `localhost` or `127.0.0.1`.

  Why: the sandbox is network-isolated. The host reaches services via
  `sbx ports <name> --publish <host>:<port>`. A service bound only to
  `127.0.0.1` / `localhost` is not reachable through a published port.

  Common flags:
  - Next.js: `next dev -H 0.0.0.0`
  - Vite: `vite --host 0.0.0.0`
  - Others: pass `--host 0.0.0.0` or set the listen address to `0.0.0.0`

  Bind to `[::]` if you need to accept both IPv4 and IPv6.
